name: Deploy tenant-service to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com/mc-bootstrap-registry
  IMAGE_NAME: tenant-service
  DEPLOYMENT_NAME: tenant-service
  CONTAINER_NAME: tenant
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target production \
            --provenance=false \
            --sbom=false \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --load \
            .

      - name: Push Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q '^-----BEGIN'; then
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}

      - name: Deploy to K8s
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
               ${{ env.CONTAINER_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
               -n ${{ env.NAMESPACE }}"
          if ! ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
               -n ${{ env.NAMESPACE }} --timeout=180s"; then
            echo "⚠️ Rollout status timed out; continuing to Verify Pod Ready."
          fi

      - name: Verify Pod Ready
        run: |
          EXPECTED="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          for ATTEMPT in 1 2 3 4 5 6 7 8 9; do
            echo "Attempt $ATTEMPT/9..."
            POD_LINE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
              "export KUBECONFIG=/home/deploy/.kube/config && \
               kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} \
               -o jsonpath='{range .items[*]}{.spec.containers[0].image} {.status.containerStatuses[0].ready}{\"\\n\"}{end}'" 2>/dev/null) || true
            echo "$POD_LINE"
            if echo "$POD_LINE" | grep -q "${EXPECTED} true"; then
              echo "✅ ${{ env.IMAGE_NAME }} is running and healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Pod not ready with image ${EXPECTED} after 90s"
          exit 1

      - name: Cleanup old registry tags
        if: success()
        run: |
          curl -sL https://github.com/digitalocean/doctl/releases/download/v1.104.0/doctl-1.104.0-linux-amd64.tar.gz | tar -xzv
          sudo mv doctl /usr/local/bin
          doctl auth init -t ${{ secrets.DOCR_TOKEN }}

          CURRENT_SHA="${{ github.sha }}"
          KEEP_TAGS="latest $CURRENT_SHA"
          TAGS_JSON=$(doctl registry repository list-tags ${{ env.IMAGE_NAME }} --registry mc-bootstrap-registry --output json 2>/dev/null || echo "[]")
          RECENT_SHAS=$(echo "$TAGS_JSON" | jq -r '.[] | select(.tag | test("^[a-f0-9]{40}$")) | "\(.updated_at) \(.tag)"' 2>/dev/null | sort -r | head -2 | awk '{print $2}')
          for SHA in $RECENT_SHAS; do KEEP_TAGS="$KEEP_TAGS $SHA"; done

          for TAG in $(echo "$TAGS_JSON" | jq -r '.[].tag' 2>/dev/null); do
            if echo " $KEEP_TAGS " | grep -q " $TAG "; then
              echo "Keeping tag: $TAG"
            else
              echo "Deleting tag: $TAG"
              doctl registry repository delete-tag ${{ env.IMAGE_NAME }} $TAG --registry mc-bootstrap-registry --force 2>/dev/null || true
            fi
          done

          echo "Starting garbage collection..."
          doctl registry garbage-collection start mc-bootstrap-registry --force --include-untagged-manifests || echo "GC already running, skipping"
