version: '3.8'

services:
  tenant-postgres-setup:
    image: pgvector/pgvector:pg15
    container_name: mc-tenant-postgres-setup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -c "
        psql -h lab-postgres -U ${POSTGRES_USER:-postgres} -c 'CREATE DATABASE tenant_db;' || true &&
        psql -h lab-postgres -U ${POSTGRES_USER:-postgres} -c 'CREATE DATABASE eventbus;' || true &&
        echo 'Databases tenant_db and eventbus ready.'
      "
    networks:
      - lab-network

  tenant-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: mc-tenant-service
    ports:
      - "8125:8120"
    environment:
      DB_HOST: lab-postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: tenant_db
      EVENTBUS_DB_HOST: lab-postgres
      EVENTBUS_DB_PORT: 5432
      EVENTBUS_DB_USER: ${POSTGRES_USER:-postgres}
      EVENTBUS_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EVENTBUS_DB_NAME: eventbus
      PORT: 8120
      PROMETHEUS_ENABLED: "true"
      GIN_MODE: debug
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-me-in-production-min-32-chars}
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      - tenant-postgres-setup
    networks:
      - lab-network
    labels:
      - "logging=promtail"
      - "service_name=tenant-service"
    restart: unless-stopped

  # LEGACY: tenant-db standalone — comentado, usar lab-postgres
